[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

# Nitro's "netlify" preset builds static assets to `dist` and the SSR
# handler to `.netlify/functions-internal/` automatically — Netlify
# picks up the function on its own, this file only needs to point
# `publish` at the static output directory.
